<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>amazon - Simple Shopping Landing Page</title>

    <!-- FontAwesome v6 Link for standard icons (Home, Cart, Profile, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Link to our simple CSS style file -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>

<body>

    <!-- 1. NAVIGATION BAR AREA -->
    <nav>
        <!-- Logo -->
        <a href="index.html" class="logo">
            <i class="fa-brands fa-shopify"></i> <!-- Brand Icon -->
            <span>Shopify</span>
        </a>

        <!-- Middle Search bar -->
        <div class="search-section">
            <input type="text" placeholder="Search products...">
        </div>

        <!-- Navigation icons on the right -->
        <ul>
             <li><a href="product.html" data-tooltip="Products" class="nav-icon-btn"><i class="fa-solid fa-store"></i></a></li>

            <!-- Shopping Cart Icon with dynamic counter badge -->
            <li class="cart-wrapper">
                <a href="checkout.html" data-tooltip="Cart" class="nav-icon-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                </a>
                <span class="cart-badge" id="cart-counter">0</span>
            </li>

            <li><a href="support.html" data-tooltip="Support" class="nav-icon-btn"><i class="fa-solid fa-headset"></i></a></li>
            <li class="profile-menu">
              <a href="#" class="profile-toggle">
                 <img src="https://ui-avatars.com/api/?name=Guest+User&background=random" alt="Guest">
                 <span>Guest</span>
              </a>

              <div class="dropdown">
                 <div class="dropdown-header">
                   <p class="name">Guest User</p>
                   <p class="email">guest@example.com</p>
                 </div>
                 <a href="#"><i class="fa-regular fa-user"></i> My Profile</a>
                 <a href="#"><i class="fa-solid fa-box-open"></i> My Orders</a>
                 <a href="#"><i class="fa-regular fa-heart"></i> Wishlist</a>
                 <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
                 <a href="#" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</a>
              </div>
            </li>
        </ul>
    </nav>
    <section class="checkout">
        <!--breadcrumb-->

     <!-- Breadcrumb Navigation -->
    <div class="breadcrumbs">
        <a href="index.html">
            <i class="fa-solid fa-house"></i> Home
        </a>

      <i class="fa-solid fa-chevron-right separator"></i>

       <a href="product.html">
            Products
       </a>

      <i class="fa-solid fa-chevron-right separator"></i>

      <span class="active">
           Checkout
      </span>
    </div>


        <div class="checkout-container">
            <div class="nowbuy" id="buyproduct">

            </div>
            <div class="overview">
                <h2>Proceed to payment</h2>
                <div class="amounttopay" id="amounttopay">

                </div>
            </div>
        </div>
    </section>
    <script src="js/count.js"></script>
    <script src="js/product.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
